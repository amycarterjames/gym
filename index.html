<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's Gym — Sessions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #2a2a2a;
    --muted: #7a7a6a;
    --sand: #f2e4c4; --sand-dk: #a08040;
    --surf: #b8ddf5; --surf-dk: #1a5f8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.65;
    padding: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }
  header {
    padding: 1.25rem 0 1rem;
    border-bottom: 2px solid var(--sand);
    margin-bottom: 1.25rem;
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { color: var(--muted); font-size: 13px; margin-top: 3px; }

  .session-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1.5px solid rgba(0,0,0,0.07);
    border-radius: 12px;
    padding: 0.9rem 1rem;
    margin-bottom: 0.65rem;
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .session-link:active { filter: brightness(0.96); }
  .session-date { font-weight: 600; font-size: 15px; }
  .session-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .session-arrow { color: var(--muted); font-size: 14px; }

  footer { text-align:center; color:var(--muted); font-size:12px; padding:1.5rem 0 2.5rem; }
</style>
</head>
<body>

<header>
  <h1>Amy's Gym</h1>
  <p>All sessions</p>
</header>

<a class="session-link" href="sessions/2026-04-29.html">
  <div>
    <div class="session-date">29 Apr 2026</div>
    <div class="session-meta">Floor · 6 gymnasts · 90 min</div>
  </div>
  <span class="session-arrow">→</span>
</a>

<!-- Add new sessions above this line -->

<footer>Amy's Gym</footer>

</body>
</html>
